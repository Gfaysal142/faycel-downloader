<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faycel Downloader Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #00f5a0;
    --primary-dim: rgba(0, 245, 160, 0.15);
    --primary-glow: rgba(0, 245, 160, 0.4);
    --secondary: #00d9f5;
    --bg-dark: #060612;
    --glass-bg: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-border-hover: rgba(0, 245, 160, 0.5);
    --text: #e8eaf0;
    --text-muted: rgba(232, 234, 240, 0.5);
    --danger: #ff4d6d;
  }

  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Animated mesh background ── */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #00f5a0, transparent 70%);
    top: -150px; right: -100px;
    animation-duration: 14s;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #00d9f5, transparent 70%);
    bottom: -120px; left: -80px;
    animation-duration: 18s;
    animation-delay: -6s;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #7b2fff, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-duration: 20s;
    animation-delay: -3s;
    opacity: 0.2;
  }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(30px, -40px) scale(1.05); }
    100% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* grid overlay */
  .bg-canvas::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ── Main card ── */
  .wrapper {
    position: relative;
    z-index: 10;
    width: 90%;
    max-width: 520px;
    padding: 16px;
  }

  .card {
    background: var(--glass-bg);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 48px 40px 40px;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 32px 64px rgba(0,0,0,0.5),
      0 0 80px rgba(0, 245, 160, 0.05);
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
    animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .card:hover {
    border-color: rgba(0, 245, 160, 0.25);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05) inset,
      0 32px 80px rgba(0,0,0,0.6),
      0 0 100px rgba(0, 245, 160, 0.1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Icon badge ── */
  .icon-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 20px;
    margin-bottom: 24px;
    font-size: 30px;
    color: #060612;
    box-shadow: 0 8px 32px var(--primary-glow);
    animation: pulse-badge 3s ease-in-out infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 8px 32px var(--primary-glow); }
    50%       { box-shadow: 0 8px 48px rgba(0, 245, 160, 0.65); }
  }

  /* ── Title ── */
  h1 {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  h1 .highlight {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 36px;
    font-weight: 400;
  }

  /* ── Platform pills ── */
  .platforms {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .pill {
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
    transition: all 0.25s;
    letter-spacing: 0.2px;
  }

  .pill:hover {
    background: var(--primary-dim);
    border-color: var(--primary-glow);
    color: var(--primary);
  }

  /* ── Input ── */
  .input-wrapper {
    position: relative;
    margin-bottom: 16px;
  }

  .input-icon {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
    transition: color 0.3s;
  }

  input[type="text"] {
    width: 100%;
    padding: 16px 48px 16px 20px;
    border-radius: 14px;
    border: 1.5px solid var(--glass-border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  }

  input[type="text"]::placeholder {
    color: var(--text-muted);
    font-size: 14px;
  }

  input[type="text"]:focus {
    border-color: var(--primary);
    background: rgba(0, 245, 160, 0.04);
    box-shadow: 0 0 0 4px rgba(0, 245, 160, 0.12);
  }

  input[type="text"]:focus + .input-icon {
    color: var(--primary);
  }

  /* ── Button ── */
  button[type="submit"] {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: #060612;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
    box-shadow: 0 4px 24px rgba(0, 245, 160, 0.3);
    letter-spacing: 0.3px;
  }

  button[type="submit"]:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 36px rgba(0, 245, 160, 0.45);
  }

  button[type="submit"]:active {
    transform: scale(0.97);
  }

  /* ripple */
  button[type="submit"]::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.35);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.5s ease, height 0.5s ease, opacity 0.5s ease;
    opacity: 0;
  }

  button[type="submit"].ripple::after {
    width: 400px;
    height: 400px;
    opacity: 0;
  }

  /* ── Loader ── */
  .loading {
    display: none;
    margin-top: 28px;
    padding: 20px;
    background: var(--primary-dim);
    border: 1px solid rgba(0, 245, 160, 0.2);
    border-radius: 14px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .loading .spinner-ring {
    display: inline-block;
    width: 36px;
    height: 36px;
    border: 3px solid rgba(0, 245, 160, 0.15);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading p {
    font-size: 14px;
    color: var(--primary);
    font-weight: 600;
    margin: 0;
  }

  .loading small {
    display: block;
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Footer ── */
  .card-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .card { padding: 36px 24px 32px; }
    .icon-badge { width: 60px; height: 60px; font-size: 24px; }
  }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="wrapper">
  <div class="card">

    <!-- Icon -->
    <div class="icon-badge">
      <i class="fas fa-bolt"></i>
    </div>

    <!-- Title -->
    <h1><span class="highlight">محمل فيصل</span> برو</h1>
    <p class="subtitle">تحميل سريع ومجاني من جميع المنصات</p>

    <!-- Supported platforms -->
    <div class="platforms">
      <span class="pill"><i class="fab fa-tiktok"></i> TikTok</span>
      <span class="pill"><i class="fab fa-instagram"></i> Instagram</span>
      <span class="pill"><i class="fab fa-youtube"></i> YouTube</span>
      <span class="pill"><i class="fab fa-twitter"></i> Twitter</span>
      <span class="pill"><i class="fab fa-facebook"></i> Facebook</span>
    </div>

    <!-- Form — IDs preserved exactly -->
    <form id="downloadForm" action="/download" method="post">
      <div class="input-wrapper">
        <input
          type="text"
          name="url"
          id="urlInput"
          placeholder="ضع رابط الفيديو هنا..."
          required
          autocomplete="off"
        >
        <span class="input-icon"><i class="fas fa-link"></i></span>
      </div>

      <button type="submit" id="btn">
        <i class="fas fa-download"></i>&nbsp; ابدأ التحميل
      </button>
    </form>

    <!-- Loader — ID preserved exactly -->
    <div class="loading" id="loader">
      <div class="spinner-ring"></div>
      <p>جاري معالجة الفيديو...</p>
      <small>انتظر لحظة، نجلب لك الفيديو الآن</small>
    </div>

    <div class="card-footer">
      مدعوم بتقنية فيصل داونلودر &nbsp;⚡
    </div>

  </div>
</div>

<script>
  // Ripple helper
  function triggerRipple(btn) {
    btn.classList.remove('ripple');
    void btn.offsetWidth; // reflow
    btn.classList.add('ripple');
  }

  document.getElementById('downloadForm').onsubmit = function () {
    const btn = document.getElementById('btn');

    // Ripple animation
    triggerRipple(btn);

    // Show loader, hide button
    setTimeout(() => {
      btn.style.display = 'none';
      document.getElementById('loader').style.display = 'block';
    }, 200);

    // SweetAlert notification
    Swal.fire({
      title: '🚀 انطلقنا!',
      text: 'جاري جلب الفيديو من السيرفر...',
      icon: 'success',
      timer: 2500,
      showConfirmButton: false,
      background: '#0f1117',
      color: '#e8eaf0',
      iconColor: '#00f5a0',
      customClass: { popup: 'swal-glass' }
    });
  };
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}");
  }
</script>

</body>
</html>
